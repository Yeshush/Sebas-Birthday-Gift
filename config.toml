# ─── JobScraper Filter-Konfiguration ─────────────────────────────────────────
# Diese Datei steuert welche Jobs gezeigt und welche ausgeblendet werden.
# Anpassungen hier wirken sich sofort auf den nächsten Scrape aus.

[filter]
# Minimales Pensum in Prozent (0-100). Jobs unter diesem Wert werden gefiltert.
min_workload_percent = 80

